<svg xmlns="http://www.w3.org/2000/svg" width="640" height="420" viewBox="0 0 640 420" role="img" aria-labelledby="title desc">
  <title id="title">UID digit example</title>
  <desc id="desc">Illustration showing a 13 to 16 digit UID that should be entered into the form.</desc>
  <rect width="640" height="420" rx="32" fill="#f0fdf4"/>
  <rect x="76" y="68" width="488" height="284" rx="30" fill="#fff" stroke="#bbf7d0" stroke-width="4"/>
  <text x="320" y="122" text-anchor="middle" font-family="Arial, sans-serif" font-size="25" font-weight="700" fill="#14532d">Enter only the UID digits</text>
  <rect x="132" y="160" width="376" height="72" rx="16" fill="#f8fafc" stroke="#cbd5e1" stroke-width="3"/>
  <text x="160" y="207" font-family="Arial, sans-serif" font-size="30" font-weight="700" letter-spacing="4" fill="#0f172a">23101002211185</text>
  <g fill="#16a34a">
    <circle cx="168" cy="278" r="15"/>
    <path d="M160 278l6 6 12-14" fill="none" stroke="#fff" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  <text x="196" y="285" font-family="Arial, sans-serif" font-size="20" font-weight="700" fill="#166534">13 to 16 digits</text>
  <g fill="#16a34a">
    <circle cx="168" cy="318" r="15"/>
    <path d="M160 318l6 6 12-14" fill="none" stroke="#fff" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  <text x="196" y="325" font-family="Arial, sans-serif" font-size="20" font-weight="700" fill="#166534">No spaces or symbols</text>
  <circle cx="500" cy="288" r="28" fill="#dcfce7" stroke="#16a34a" stroke-width="4"/>
  <text x="500" y="297" text-anchor="middle" font-family="Arial, sans-serif" font-size="29" font-weight="700" fill="#16a34a">3</text>
</svg>
